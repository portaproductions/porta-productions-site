<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 853" font-family="'Cormorant Garamond', Georgia, serif">
  <rect width="1280" height="853" fill="#F4F1EA"/>
  <!-- furniture + label styles -->
