      <line x1="835" y1="70" x2="835" y2="783"/>
      <line x1="70" y1="395" x2="475" y2="395"/>
      <line x1="70" y1="555" x2="475" y2="555"/>
      <line x1="475" y1="500" x2="835" y2="500"/>
      <line x1="835" y1="320" x2="1210" y2="320"/>
      <line x1="835" y1="560" x2="1210" y2="560"/>
    </g>
  </g>
  <!-- door gaps (cover wall) + swing arcs -->
