    <line x1="70" y1="812" x2="1210" y2="812" stroke="#C9C3B5" stroke-width="2"/>
    <text x="70" y="838" font-size="20" letter-spacing="2" fill="#121A25">FIRST FLOOR · 2,480 SQ FT</text>
    <text x="1210" y="838" text-anchor="end" font-family="'Lato', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#8A8576">PORTA PRODUCTIONS · 2D FLOOR PLAN</text>
